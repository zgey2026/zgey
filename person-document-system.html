<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人员与证件自由录入系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#06b6d4',
                        secondary: '#8b5cf6',
                        dark: '#0f172a',
                        light: '#f8fafc',
                        accent: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        darkBlue: '#1e40af',
                        lightBlue: '#3b82f6'
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(6, 182, 212, 0.37)',
                        'glass-dark': '0 8px 32px 0 rgba(15, 23, 42, 0.5)',
                        'neon': '0 0 5px #06b6d4, 0 0 20px #06b6d4',
                        'neon-purple': '0 0 5px #8b5cf6, 0 0 20px #8b5cf6'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px #06b6d4, 0 0 10px #06b6d4' },
                            '100%': { boxShadow: '0 0 10px #06b6d4, 0 0 20px #06b6d4, 0 0 30px #06b6d4' }
                        }
                    }
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                transition: all 0.3s ease;
            }
            .glass:hover {
                background: rgba(255, 255, 255, 0.15);
                box-shadow: 0 8px 32px 0 rgba(6, 182, 212, 0.4);
            }
            .glass-dark {
                background: rgba(15, 23, 42, 0.8);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                transition: all 0.3s ease;
            }
            .glass-dark:hover {
                background: rgba(15, 23, 42, 0.9);
                box-shadow: 0 8px 32px 0 rgba(6, 182, 212, 0.3);
            }
            .gradient-bg {
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            }
            .gradient-text {
                background: linear-gradient(90deg, #06b6d4, #8b5cf6);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 25px -5px rgba(6, 182, 212, 0.4);
            }
            .btn-primary {
                position: relative;
                overflow: hidden;
                transition: all 0.3s ease;
            }
            .btn-primary::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
                transition: left 0.6s ease;
            }
            .btn-primary:hover::before {
                left: 100%;
            }
            .input-focus {
                transition: all 0.3s ease;
            }
            .input-focus:focus {
                box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.3);
                border-color: #06b6d4;
            }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8">
        <!-- 顶部搜索栏和添加按钮 -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold gradient-text mb-2 animate-pulse-slow">建筑公司人员证件</h1>
                <p class="text-red-400 font-medium mb-2 flex items-center">
                    <i class="fa fa-shield mr-2"></i> 内部资料，仅限建筑公司市场部使用，违规传输追究法律责任
                </p>
                <div class="flex items-center gap-4 mb-2">
                    <p id="currentDateTime" class="text-blue-200 text-sm font-medium"></p>
                    <button id="downloadReportBtn" class="bg-accent text-white px-4 py-2 rounded-lg hover:bg-green-600 transition-colors flex items-center text-sm btn-primary">
                        <i class="fa fa-download mr-1"></i> 下载报表
                    </button>
                </div>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                <div class="relative w-full sm:w-64">
                    <input type="text" id="searchInput" placeholder="搜索人员或证件..." 
                        class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white placeholder-gray-400 input-focus">
                    <i class="fa fa-search absolute right-3 top-3 text-gray-400"></i>
                </div>
                <button id="addPersonBtn" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-cyan-600 transition-colors flex items-center justify-center btn-primary">
                    <i class="fa fa-plus mr-2"></i> 添加人员
                </button>
            </div>
        </div>

        <!-- 主内容区域 -->
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- 左侧人员列表 -->
            <div class="lg:w-1/3">
                <div class="glass-dark rounded-xl p-4 shadow-glass-dark border border-cyan-800/30">
                    <h2 class="text-xl font-semibold gradient-text mb-4 flex items-center">
                        <i class="fa fa-users mr-2"></i> 人员列表
                    </h2>
                    <div class="mb-4">
                        <label for="companyFilter" class="block text-sm font-medium text-blue-200 mb-1">筛选公司</label>
                        <select id="companyFilter" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white input-focus">
                            <option value="">全部公司</option>
                            <option value="二冶集团（雄安）建筑科技有限公司">二冶集团（雄安）建筑科技有限公司</option>
                            <option value="中国二冶集团有限公司">中国二冶集团有限公司</option>
                        </select>
                    </div>
                    <div id="personList" class="space-y-3 max-h-[600px] overflow-y-auto">
                        <!-- 人员卡片将通过JS动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 右侧人员详情和证件管理 -->
            <div class="lg:w-2/3">
                <div id="personDetail" class="glass-dark rounded-xl p-6 shadow-glass-dark border border-cyan-800/30 hidden">
                    <!-- 人员详情将通过JS动态生成 -->
                </div>
                <div id="noSelection" class="glass-dark rounded-xl p-12 shadow-glass-dark border border-cyan-800/30 flex flex-col items-center justify-center">
                    <i class="fa fa-user-circle text-5xl text-cyan-400 mb-4 animate-float"></i>
                    <p class="text-blue-200 text-lg">请从左侧选择一个人员查看详情</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑人员模态框 -->
    <div id="personModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 hidden">
        <div class="glass-dark rounded-xl p-6 w-full max-w-md border border-cyan-800/30 shadow-glass-dark">
            <div class="flex justify-between items-center mb-4">
                <h3 id="personModalTitle" class="text-xl font-semibold gradient-text">添加人员</h3>
                <button id="closePersonModal" class="text-blue-200 hover:text-white transition-colors">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <form id="personForm">
                <input type="hidden" id="personId">
                <div class="mb-4">
                    <label for="personName" class="block text-sm font-medium text-blue-200 mb-1">姓名 *</label>
                    <input type="text" id="personName" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white input-focus" required>
                </div>
                <div class="mb-4">
                    <label for="personIdNumber" class="block text-sm font-medium text-blue-200 mb-1">身份证号 *</label>
                    <input type="text" id="personIdNumber" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white input-focus" required>
                </div>
                <div class="mb-4">
                    <label for="personCompany" class="block text-sm font-medium text-blue-200 mb-1">所属公司</label>
                    <select id="personCompany" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white input-focus" required>
                        <option value="">请选择</option>
                        <option value="二冶集团（雄安）建筑科技有限公司">二冶集团（雄安）建筑科技有限公司</option>
                        <option value="中国二冶集团有限公司">中国二冶集团有限公司</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label for="personRemark" class="block text-sm font-medium text-blue-200 mb-1">备注</label>
                    <textarea id="personRemark" rows="2" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white input-focus"></textarea>
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" id="cancelPersonBtn" class="px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white hover:bg-gray-700 transition-colors">取消</button>
                    <button type="submit" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-cyan-600 transition-colors btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 添加/编辑证件模态框 -->
    <div id="documentModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 hidden">
        <div class="glass-dark rounded-xl p-6 w-full max-w-md border border-cyan-800/30 shadow-glass-dark">
            <div class="flex justify-between items-center mb-4">
                <h3 id="documentModalTitle" class="text-xl font-semibold gradient-text">添加证件</h3>
                <button id="closeDocumentModal" class="text-blue-200 hover:text-white transition-colors">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <form id="documentForm">
                <input type="hidden" id="documentId">
                <input type="hidden" id="currentPersonId">
                <div class="mb-4">
                    <label for="documentName" class="block text-sm font-medium text-blue-200 mb-1">证件名称 *</label>
                    <select id="documentName" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white input-focus" required>
                        <option value="">请选择证件类型</option>
                        <option value="身份证">身份证</option>
                        <option value="毕业证">毕业证</option>
                        <option value="职称证">职称证</option>
                        <option value="一级注册建造师证">一级注册建造师证</option>
                        <option value="二级注册建造师">二级注册建造师</option>
                        <option value="一级造价师">一级造价师</option>
                        <option value="安全B类">安全B类</option>
                        <option value="安全C类">安全C类</option>
                        <option value="施工员">施工员</option>
                        <option value="质量员">质量员</option>
                        <option value="材料员">材料员</option>
                        <option value="劳务员">劳务员</option>
                        <option value="资料员">资料员</option>
                        <option value="标准员">标准员</option>
                        <option value="机械员">机械员</option>
                        <option value="预算员">预算员</option>
                        <option value="试验员">试验员</option>
                        <option value="测量员">测量员</option>
                    </select>
                </div>
                <div id="professionalField" class="mb-4 hidden">
                    <div class="flex justify-between items-center mb-1">
                        <label for="documentProfessional" class="block text-sm font-medium text-blue-200">专业</label>
                        <button type="button" id="addProfessionalBtn" class="text-sm text-cyan-400 hover:text-cyan-300 transition-colors">添加专业</button>
                    </div>
                    <select id="documentProfessional" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white input-focus">
                        <option value="">请选择专业</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label for="documentNumber" class="block text-sm font-medium text-blue-200 mb-1">证件号码 *</label>
                    <input type="text" id="documentNumber" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white input-focus" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-blue-200 mb-1">有效期</label>
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <input type="date" id="documentExpiryStart" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white input-focus">
                        </div>
                        <span class="flex items-center text-blue-200">至</span>
                        <div class="flex-1">
                            <input type="date" id="documentExpiryEnd" class="w-full px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white input-focus">
                        </div>
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-blue-200 mb-1">证件附件</label>
                    <div class="flex items-center gap-4">
                        <input type="file" id="documentImage" accept="image/*" class="hidden" onchange="previewImage(this)">
                        <label for="documentImage" class="px-4 py-2 border border-gray-700 bg-gray-800 text-white rounded-lg cursor-pointer hover:bg-gray-700 transition-colors">
                            <i class="fa fa-upload mr-2"></i> 选择图片
                        </label>
                        <div id="imagePreview" class="hidden">
                            <img id="previewImg" src="" alt="预览" class="w-16 h-16 object-cover rounded-lg border border-cyan-800/50">
                        </div>
                        <button type="button" id="removeImageBtn" class="text-red-400 hover:text-red-300 transition-colors hidden">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" id="cancelDocumentBtn" class="px-4 py-2 rounded-lg border border-gray-700 bg-gray-800 text-white hover:bg-gray-700 transition-colors">取消</button>
                    <button type="submit" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-cyan-600 transition-colors btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 图片预览模态框 -->
    <div id="imagePreviewModal" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 hidden">
        <div class="relative max-w-4xl max-h-[90vh] border border-cyan-800/30 rounded-xl p-4 glass-dark">
            <button id="closeImagePreview" class="absolute top-4 right-4 text-cyan-400 text-2xl hover:text-white transition-colors">
                <i class="fa fa-times"></i>
            </button>
            <img id="previewModalImg" src="" alt="预览" class="max-w-full max-h-[80vh] object-contain rounded-lg border border-cyan-800/50">
        </div>
    </div>

    <script>
        // 全局变量
        let persons = [];
        let currentPerson = null;
        let searchQuery = '';
        let professionals = [];

        // 更新当前日期时间
        function updateDateTime() {
            const now = new Date();
            const options = {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                weekday: 'long',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('currentDateTime').textContent = now.toLocaleString('zh-CN', options);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderPersonList();
            bindEvents();
            updateDateTime();
            setInterval(updateDateTime, 1000);
        });

        // 加载数据
        function loadData() {
            const storedPersons = localStorage.getItem('persons');
            if (storedPersons) {
                persons = JSON.parse(storedPersons);
            }
            
            const storedProfessionals = localStorage.getItem('professionals');
            if (storedProfessionals) {
                professionals = JSON.parse(storedProfessionals);
            }
        }

        // 保存数据
        function saveData() {
            localStorage.setItem('persons', JSON.stringify(persons));
        }

        // 保存专业数据
        function saveProfessionals() {
            localStorage.setItem('professionals', JSON.stringify(professionals));
        }

        // 切换专业字段显示
        function toggleProfessionalField() {
            const docName = document.getElementById('documentName').value;
            const professionalField = document.getElementById('professionalField');
            
            // 需要专业字段的证件类型
            const needProfessional = ['一级注册建造师证', '二级注册建造师', '一级造价师'];
            
            if (needProfessional.includes(docName)) {
                professionalField.classList.remove('hidden');
                renderProfessionalOptions();
            } else {
                professionalField.classList.add('hidden');
            }
        }

        // 渲染专业选项
        function renderProfessionalOptions() {
            const select = document.getElementById('documentProfessional');
            select.innerHTML = '<option value="">请选择专业</option>';
            
            professionals.forEach(professional => {
                const option = document.createElement('option');
                option.value = professional;
                option.textContent = professional;
                select.appendChild(option);
            });
        }

        // 添加专业
        function addProfessional() {
            const professional = prompt('请输入专业名称：');
            if (professional && professional.trim()) {
                if (!professionals.includes(professional.trim())) {
                    professionals.push(professional.trim());
                    saveProfessionals();
                    renderProfessionalOptions();
                } else {
                    alert('该专业已存在');
                }
            }
        }

        // 绑定事件
        function bindEvents() {
            // 添加人员按钮
            document.getElementById('addPersonBtn').addEventListener('click', function() {
                openPersonModal();
            });

            // 搜索框
            document.getElementById('searchInput').addEventListener('input', function(e) {
                searchQuery = e.target.value.toLowerCase();
                renderPersonList();
            });

            // 人员模态框
            document.getElementById('closePersonModal').addEventListener('click', closePersonModal);
            document.getElementById('cancelPersonBtn').addEventListener('click', closePersonModal);
            document.getElementById('personForm').addEventListener('submit', function(e) {
                e.preventDefault();
                savePerson();
            });

            // 证件模态框
            document.getElementById('closeDocumentModal').addEventListener('click', closeDocumentModal);
            document.getElementById('cancelDocumentBtn').addEventListener('click', closeDocumentModal);
            document.getElementById('documentForm').addEventListener('submit', function(e) {
                e.preventDefault();
                saveDocument();
            });

            // 删除图片按钮
            document.getElementById('removeImageBtn').addEventListener('click', function() {
                document.getElementById('documentImage').value = '';
                document.getElementById('imagePreview').classList.add('hidden');
                this.classList.add('hidden');
            });

            // 图片预览模态框关闭按钮
            document.getElementById('closeImagePreview').addEventListener('click', function() {
                document.getElementById('imagePreviewModal').classList.add('hidden');
            });

            // 公司筛选下拉框
            document.getElementById('companyFilter').addEventListener('change', function() {
                renderPersonList();
            });

            // 证件类型下拉框
            document.getElementById('documentName').addEventListener('change', function() {
                toggleProfessionalField();
            });

            // 添加专业按钮
            document.getElementById('addProfessionalBtn').addEventListener('click', function() {
                addProfessional();
            });

            // 下载报表按钮
            document.getElementById('downloadReportBtn').addEventListener('click', function() {
                downloadReport();
            });
        }

        // 渲染人员列表
        function renderPersonList() {
            const personList = document.getElementById('personList');
            personList.innerHTML = '';

            const companyFilter = document.getElementById('companyFilter').value;

            const filteredPersons = persons.filter(person => {
                // 公司筛选
                if (companyFilter && person.company !== companyFilter) {
                    return false;
                }

                // 搜索筛选
                if (!searchQuery) return true;
                
                // 搜索姓名和身份证号
                if (person.name.toLowerCase().includes(searchQuery) || 
                    person.idNumber.toLowerCase().includes(searchQuery)) {
                    return true;
                }
                
                // 搜索证件
                return person.documents.some(doc => {
                    return doc.docName.toLowerCase().includes(searchQuery) || 
                           doc.docNumber.toLowerCase().includes(searchQuery);
                });
            });

            if (filteredPersons.length === 0) {
                personList.innerHTML = '<p class="text-blue-300 text-center py-4">暂无人员</p>';
                return;
            }

            filteredPersons.forEach(person => {
                const personCard = document.createElement('div');
                personCard.className = `p-4 rounded-lg cursor-pointer transition-all card-hover ${currentPerson && currentPerson.id === person.id ? 'bg-primary text-white border border-cyan-400' : 'bg-gray-800 hover:bg-gray-700 border border-gray-700'}`;
                personCard.innerHTML = `
                    <div class="font-medium text-blue-200">${person.name}</div>
                    <div class="text-sm ${currentPerson && currentPerson.id === person.id ? 'text-white/80' : 'text-blue-300'}">${person.company || '未设置'}</div>
                    <div class="text-xs mt-1 ${currentPerson && currentPerson.id === person.id ? 'text-white/60' : 'text-blue-400'}">证件数: ${person.documents.length}</div>
                `;
                personCard.addEventListener('click', function() {
                    selectPerson(person.id);
                });
                personList.appendChild(personCard);
            });
        }

        // 选择人员
        function selectPerson(personId) {
            currentPerson = persons.find(person => person.id === personId);
            if (currentPerson) {
                document.getElementById('noSelection').classList.add('hidden');
                document.getElementById('personDetail').classList.remove('hidden');
                renderPersonDetail();
                renderPersonList();
            }
        }

        // 渲染人员详情
        function renderPersonDetail() {
            const personDetail = document.getElementById('personDetail');
            personDetail.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-2xl font-bold gradient-text">${currentPerson.name}</h2>
                        <p class="text-blue-300">${currentPerson.idNumber}</p>
                        ${currentPerson.company ? `<p class="text-blue-400 mt-1">所属公司: ${currentPerson.company}</p>` : ''}
                        ${currentPerson.remark ? `<p class="text-blue-400 mt-1">备注: ${currentPerson.remark}</p>` : ''}
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editPerson('${currentPerson.id}')" class="px-3 py-1 rounded-lg bg-blue-900/50 text-cyan-400 hover:bg-blue-800/50 transition-colors border border-cyan-800/30">
                            <i class="fa fa-edit"></i>
                        </button>
                        <button onclick="deletePerson('${currentPerson.id}')" class="px-3 py-1 rounded-lg bg-red-900/50 text-red-400 hover:bg-red-800/50 transition-colors border border-red-800/30">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-semibold gradient-text flex items-center">
                            <i class="fa fa-id-card mr-2"></i> 证件列表
                        </h3>
                        <button onclick="openDocumentModal()" class="bg-primary text-white px-3 py-1 rounded-lg hover:bg-cyan-600 transition-colors flex items-center btn-primary">
                            <i class="fa fa-plus mr-1"></i> 添加证件
                        </button>
                    </div>
                    <div id="documentList" class="space-y-4">
                        ${currentPerson.documents.length > 0 ? currentPerson.documents.map(doc => `
                            <div class="bg-gray-800 rounded-lg p-4 shadow-sm border border-gray-700 card-hover">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <div class="font-medium text-blue-200">${doc.docName}</div>
                                        ${doc.professional ? `<div class="text-blue-400 text-sm">专业: ${doc.professional}</div>` : ''}
                                        <div class="text-blue-300">${doc.docNumber}</div>
                                        ${doc.expiry ? `<div class="text-blue-400 text-sm mt-1">有效期: ${doc.expiry}</div>` : ''}
                                    </div>
                                    <div class="flex gap-2">
                                        ${doc.docImage ? `
                                            <div class="w-12 h-12 rounded-lg overflow-hidden border border-cyan-800/50">
                                                <img src="${doc.docImage}" alt="${doc.docName}" class="w-full h-full object-cover cursor-pointer hover:opacity-90 transition-opacity">
                                            </div>
                                        ` : ''}
                                        <button onclick="editDocument('${doc.docId}')" class="px-2 py-1 rounded bg-blue-900/50 text-cyan-400 hover:bg-blue-800/50 transition-colors border border-cyan-800/30">
                                            <i class="fa fa-edit"></i>
                                        </button>
                                        ${doc.docImage ? `
                                            <button onclick="previewDocumentImage('${doc.docId}')" class="px-2 py-1 rounded bg-purple-900/50 text-purple-400 hover:bg-purple-800/50 transition-colors border border-purple-800/30">
                                                <i class="fa fa-eye"></i>
                                            </button>
                                        ` : ''}
                                        ${doc.docImage ? `
                                            <button onclick="downloadDocument('${doc.docId}')" class="px-2 py-1 rounded bg-green-900/50 text-green-400 hover:bg-green-800/50 transition-colors border border-green-800/30">
                                                <i class="fa fa-download"></i>
                                            </button>
                                        ` : ''}
                                        <button onclick="deleteDocument('${doc.docId}')" class="px-2 py-1 rounded bg-red-900/50 text-red-400 hover:bg-red-800/50 transition-colors border border-red-800/30">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('') : '<p class="text-blue-300 text-center py-4">暂无证件</p>'}
                    </div>
                </div>
            `;
        }

        // 打开添加人员模态框
        function openPersonModal(personId = null) {
            if (personId) {
                const person = persons.find(p => p.id === personId);
                if (person) {
                    document.getElementById('personId').value = person.id;
                    document.getElementById('personName').value = person.name;
                    document.getElementById('personIdNumber').value = person.idNumber;
                    document.getElementById('personCompany').value = person.company || '';
                    document.getElementById('personRemark').value = person.remark || '';
                    document.getElementById('personModalTitle').textContent = '编辑人员';
                }
            } else {
                document.getElementById('personForm').reset();
                document.getElementById('personId').value = '';
                document.getElementById('personModalTitle').textContent = '添加人员';
            }
            document.getElementById('personModal').classList.remove('hidden');
        }

        // 关闭人员模态框
        function closePersonModal() {
            document.getElementById('personModal').classList.add('hidden');
        }

        // 保存人员
        function savePerson() {
            const id = document.getElementById('personId').value;
            const name = document.getElementById('personName').value;
            const idNumber = document.getElementById('personIdNumber').value;
            const company = document.getElementById('personCompany').value;
            const remark = document.getElementById('personRemark').value;

            // 验证身份证号唯一性
            const existingPerson = persons.find(p => p.idNumber === idNumber && p.id !== id);
            if (existingPerson) {
                alert('身份证号已存在');
                return;
            }

            if (id) {
                // 编辑现有人员
                const index = persons.findIndex(p => p.id === id);
                if (index !== -1) {
                    persons[index] = {
                        ...persons[index],
                        name,
                        idNumber,
                        company,
                        remark
                    };
                }
            } else {
                // 添加新人员
                const newPerson = {
                    id: Date.now().toString(),
                    name,
                    idNumber,
                    company,
                    remark,
                    documents: []
                };
                persons.push(newPerson);
            }

            saveData();
            renderPersonList();
            closePersonModal();

            // 如果是新添加的人员，自动选择
            if (!id) {
                selectPerson(persons[persons.length - 1].id);
            } else if (currentPerson && currentPerson.id === id) {
                // 如果编辑的是当前选中的人员，更新详情
                selectPerson(id);
            }
        }

        // 编辑人员
        function editPerson(personId) {
            openPersonModal(personId);
        }

        // 删除人员
        function deletePerson(personId) {
            if (confirm('确定要删除该人员及其所有证件吗？')) {
                persons = persons.filter(p => p.id !== personId);
                saveData();
                renderPersonList();
                
                if (currentPerson && currentPerson.id === personId) {
                    currentPerson = null;
                    document.getElementById('personDetail').classList.add('hidden');
                    document.getElementById('noSelection').classList.remove('hidden');
                }
            }
        }

        // 打开添加证件模态框
        function openDocumentModal(docId = null) {
            if (!currentPerson) return;

            if (docId) {
                const doc = currentPerson.documents.find(d => d.docId === docId);
                if (doc) {
                    document.getElementById('documentId').value = doc.docId;
                    document.getElementById('documentName').value = doc.docName;
                    document.getElementById('documentNumber').value = doc.docNumber;
                    document.getElementById('documentProfessional').value = doc.professional || '';
                    document.getElementById('documentExpiryStart').value = doc.expiryStart || '';
                    document.getElementById('documentExpiryEnd').value = doc.expiryEnd || '';
                    document.getElementById('currentPersonId').value = currentPerson.id;
                    document.getElementById('documentModalTitle').textContent = '编辑证件';
                    
                    // 处理专业字段显示
                    toggleProfessionalField();
                    
                    // 处理图片预览
                    if (doc.docImage) {
                        document.getElementById('previewImg').src = doc.docImage;
                        document.getElementById('imagePreview').classList.remove('hidden');
                        document.getElementById('removeImageBtn').classList.remove('hidden');
                    } else {
                        document.getElementById('imagePreview').classList.add('hidden');
                        document.getElementById('removeImageBtn').classList.add('hidden');
                    }
                }
            } else {
                document.getElementById('documentForm').reset();
                document.getElementById('documentId').value = '';
                document.getElementById('currentPersonId').value = currentPerson.id;
                document.getElementById('documentModalTitle').textContent = '添加证件';
                document.getElementById('imagePreview').classList.add('hidden');
                document.getElementById('removeImageBtn').classList.add('hidden');
                // 处理专业字段显示
                toggleProfessionalField();
            }
            document.getElementById('documentModal').classList.remove('hidden');
        }

        // 关闭证件模态框
        function closeDocumentModal() {
            document.getElementById('documentModal').classList.add('hidden');
        }

        // 预览图片
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('removeImageBtn').classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 保存证件
        function saveDocument() {
            const docId = document.getElementById('documentId').value;
            const personId = document.getElementById('currentPersonId').value;
            const docName = document.getElementById('documentName').value;
            const docNumber = document.getElementById('documentNumber').value;
            const professional = document.getElementById('documentProfessional').value;
            const expiryStart = document.getElementById('documentExpiryStart').value;
            const expiryEnd = document.getElementById('documentExpiryEnd').value;
            const fileInput = document.getElementById('documentImage');
            
            let docImage = null;
            if (fileInput.files && fileInput.files[0]) {
                // 这里应该使用FileReader读取文件，但由于我们在预览时已经读取了，所以可以直接使用预览的src
                docImage = document.getElementById('previewImg').src;
            }

            // 构建有效期字符串
            let expiry = '';
            if (expiryStart && expiryEnd) {
                expiry = `${expiryStart} 至 ${expiryEnd}`;
            }

            const personIndex = persons.findIndex(p => p.id === personId);
            if (personIndex !== -1) {
                if (docId) {
                    // 编辑现有证件
                    const docIndex = persons[personIndex].documents.findIndex(d => d.docId === docId);
                    if (docIndex !== -1) {
                        persons[personIndex].documents[docIndex] = {
                            ...persons[personIndex].documents[docIndex],
                            docName,
                            docNumber,
                            professional,
                            expiry,
                            expiryStart,
                            expiryEnd,
                            docImage
                        };
                    }
                } else {
                    // 添加新证件
                    const newDocument = {
                        docId: Date.now().toString(),
                        docName,
                        docNumber,
                        professional,
                        expiry,
                        expiryStart,
                        expiryEnd,
                        docImage
                    };
                    persons[personIndex].documents.push(newDocument);
                }

                saveData();
                selectPerson(personId);
                closeDocumentModal();
            }
        }

        // 编辑证件
        function editDocument(docId) {
            openDocumentModal(docId);
        }

        // 删除证件
        function deleteDocument(docId) {
            if (confirm('确定要删除该证件吗？')) {
                if (currentPerson) {
                    currentPerson.documents = currentPerson.documents.filter(d => d.docId !== docId);
                    const personIndex = persons.findIndex(p => p.id === currentPerson.id);
                    if (personIndex !== -1) {
                        persons[personIndex] = currentPerson;
                    }
                    saveData();
                    selectPerson(currentPerson.id);
                }
            }
        }

        // 下载证件
        function downloadDocument(docId) {
            if (currentPerson) {
                const doc = currentPerson.documents.find(d => d.docId === docId);
                if (doc && doc.docImage) {
                    // 创建一个a标签用于下载
                    const link = document.createElement('a');
                    link.href = doc.docImage;
                    link.download = `${doc.docName}_${doc.docNumber}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            }
        }

        // 预览证件图片
        function previewDocumentImage(docId) {
            if (currentPerson) {
                const doc = currentPerson.documents.find(d => d.docId === docId);
                if (doc && doc.docImage) {
                    document.getElementById('previewModalImg').src = doc.docImage;
                    document.getElementById('imagePreviewModal').classList.remove('hidden');
                }
            }
        }

        // 下载报表
        function downloadReport() {
            // 表头
            let csvContent = "序号,姓名,所属公司,身份证号,注册证,注册证专业,职称证,职称证专业\n";

            // 遍历人员
            persons.forEach((person, index) => {
                // 查找注册证（一级注册建造师证、二级注册建造师、一级造价师）
                const registrationCert = person.documents.find(doc => {
                    return ['一级注册建造师证', '二级注册建造师', '一级造价师'].includes(doc.docName);
                });

                // 查找职称证
                const professionalTitleCert = person.documents.find(doc => doc.docName === '职称证');

                // 构建行数据
                const row = [
                    index + 1, // 序号
                    person.name, // 姓名
                    person.company || '', // 所属公司
                    person.idNumber, // 身份证号
                    registrationCert ? registrationCert.docNumber : '', // 注册证
                    registrationCert ? registrationCert.professional : '', // 注册证专业
                    professionalTitleCert ? professionalTitleCert.docNumber : '', // 职称证
                    professionalTitleCert ? professionalTitleCert.professional : '' // 职称证专业
                ];

                // 添加到CSV内容
                csvContent += row.join(',') + '\n';
            });

            // 创建Blob对象
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);

            // 创建下载链接
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', `人员证件报表_${new Date().toISOString().slice(0, 10)}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
